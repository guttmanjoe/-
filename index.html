<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצטרפות לפיילוט / קביעת פגישה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Heebo:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#EEF0E9;
    --paper:#FFFFFF;
    --ink:#1B2430;
    --ink-soft:#606A76;
    --teal:#1F6F5C;
    --teal-dark:#154A3F;
    --teal-tint:#E4EFEC;
    --amber:#D98F3A;
    --amber-tint:#FBF0E1;
    --line:#DEE1D8;
    --danger:#B3452B;
    --radius:18px;
    --shadow: 0 8px 24px rgba(27,36,48,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Heebo',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.06em;
    color:var(--teal-dark);
    text-transform:uppercase;
  }
  h1,h2,h3{font-family:'Rubik',sans-serif;margin:0;}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px 6px;
  }
  .brand-slot{
    display:flex;align-items:center;gap:10px;
  }
  .logo-badge{
    width:40px;height:40px;
    flex-shrink:0;
  }
  .logo-badge img{width:100%;height:100%;object-fit:contain;display:block;}
  .brand-name{font-family:'Rubik',sans-serif;font-weight:700;font-size:15px;color:var(--ink);}
  .required-note{
    font-size:12px;color:var(--ink-soft);margin-top:10px;
  }
  .required-note .star{color:var(--amber);font-weight:600;}
  .req-star{color:var(--amber);font-weight:600;margin-inline-start:2px;}
  .admin-btn{
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink-soft);font-size:15px;
    transition:.15s;
  }
  .admin-btn:hover{border-color:var(--teal);color:var(--teal);}

  .path{
    display:flex;align-items:center;gap:6px;
    padding:14px 20px 4px;
    flex-wrap:wrap;
  }
  .path-step{display:flex;align-items:center;gap:6px;}
  .path-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--line);
    flex-shrink:0;
  }
  .path-step.done .path-dot{background:var(--teal);}
  .path-step.current .path-dot{
    background:var(--paper);
    border:2.5px solid var(--teal);
    width:10px;height:10px;
  }
  .path-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--ink-soft);
  }
  .path-step.done .path-label,.path-step.current .path-label{color:var(--teal-dark);font-weight:500;}
  .path-line{width:16px;height:1px;background:var(--line);}

  .screen{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:18px 20px 40px;
    animation:rise .35s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .headline{font-size:25px;font-weight:700;line-height:1.3;margin-top:14px;}
  .subline{font-size:14.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}

  .choice-stack{margin-top:26px;display:flex;flex-direction:column;gap:14px;}
  .choice-card{
    background:var(--paper);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    display:flex;
    align-items:center;
    gap:16px;
    cursor:pointer;
    text-align:right;
    transition:.15s ease;
    box-shadow:var(--shadow);
  }
  .choice-card:hover{border-color:var(--teal);transform:translateY(-2px);}
  .choice-icon{
    width:46px;height:46px;border-radius:12px;
    background:var(--teal-tint);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
  }
  .choice-body{flex:1;}
  .choice-title{font-family:'Rubik',sans-serif;font-weight:600;font-size:16.5px;}
  .choice-desc{font-size:13px;color:var(--ink-soft);margin-top:3px;}
  .choice-arrow{color:var(--ink-soft);font-size:18px;flex-shrink:0;}

  .back-btn{
    align-self:flex-start;
    background:none;border:none;
    color:var(--ink-soft);
    font-family:'Heebo',sans-serif;font-size:13.5px;
    cursor:pointer;display:flex;align-items:center;gap:5px;
    padding:6px 0;margin-bottom:2px;
  }
  .back-btn:hover{color:var(--teal-dark);}

  form{margin-top:20px;display:flex;flex-direction:column;gap:14px;}
  .field label{
    display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink);
  }

  .field input{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:11px;
    padding:12px 14px;
    font-size:14.5px;
    font-family:'Heebo',sans-serif;
    background:var(--paper);
    color:var(--ink);
    transition:.15s;
  }
  .field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
  .field input.err{border-color:var(--danger);}
  .field .err-msg{color:var(--danger);font-size:12px;margin-top:5px;display:none;}
  .field.has-err .err-msg{display:block;}

  .submit-btn{
    margin-top:8px;
    background:var(--teal);
    color:#fff;
    border:none;border-radius:12px;
    padding:15px;
    font-family:'Rubik',sans-serif;font-weight:600;font-size:15px;
    cursor:pointer;transition:.15s;
  }
  .submit-btn:hover{background:var(--teal-dark);}
  .submit-btn:disabled{opacity:.6;cursor:default;}

  .success-wrap{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px;
  }
  .success-icon{
    width:64px;height:64px;border-radius:50%;
    background:var(--teal-tint);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:18px;
  }
  .home-btn{
    margin-top:22px;background:none;border:1.5px solid var(--line);
    border-radius:11px;padding:11px 20px;font-family:'Heebo',sans-serif;
    font-size:13.5px;color:var(--ink);cursor:pointer;
  }
  .home-btn:hover{border-color:var(--teal);color:var(--teal-dark);}

  /* Admin */
  .admin-overlay{
    position:fixed;inset:0;background:rgba(27,36,48,0.55);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .admin-card{
    background:var(--paper);border-radius:16px;padding:26px;max-width:340px;width:100%;
    box-shadow:var(--shadow);
  }
  .admin-card input{
    width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;
    font-size:14px;margin-top:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-align:center;
  }
  .admin-card .row{display:flex;gap:10px;margin-top:16px;}
  .admin-card button{
    flex:1;border-radius:10px;padding:11px;font-family:'Heebo',sans-serif;font-weight:500;
    font-size:13.5px;cursor:pointer;border:1.5px solid var(--line);background:var(--paper);
  }
  .admin-card button.primary{background:var(--teal);color:#fff;border-color:var(--teal);}

  .admin-screen{padding:20px;max-width:480px;margin:0 auto;}
  .admin-screen h2, .admin-screen h3 { color: var(--ink); }
  .admin-section{
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:20px;margin-bottom:16px;box-shadow:var(--shadow);
  }
  .admin-section h3{font-size:15px;margin-bottom:12px;}
  .qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .qr-url{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);
    word-break:break-all;text-align:center;background:var(--bg);padding:8px 10px;border-radius:8px;
  }
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;}
  .stat-pill{
    background:var(--teal-tint);color:var(--teal-dark);border-radius:10px;
    padding:8px 12px;font-size:13px;font-weight:500;font-family:'IBM Plex Mono',monospace;
  }
  .sub-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
  .sub-table th{
    text-align:right;color:var(--ink-soft);font-weight:500;font-size:10.5px;
    padding:6px 4px;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;
  }
  .sub-table td{padding:7px 4px;border-bottom:1px solid var(--line);vertical-align:top;}
  .table-wrap{overflow-x:auto;max-height:280px;overflow-y:auto;margin-top:4px;}
  .tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;
    background:var(--amber-tint);color:#8a5a1e;white-space:nowrap;
  }
  .btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .small-btn{
    border:1.5px solid var(--line);background:var(--paper);border-radius:10px;
    padding:9px 14px;font-size:12.5px;cursor:pointer;font-family:'Heebo',sans-serif;
  }
  .small-btn.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
  .small-btn.danger{color:var(--danger);border-color:var(--danger);}
  .empty-note{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:16px 0;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const LOGO_DATA_URI = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAPAAAADwCAYAAAA+VemSAAEAAElEQVR42uz9ebxl11nfCX/XsIcz3fnemkdVaZZs4REwYDObELpJY3VI3oQknTifThM6yUtIB5qU1CRvZySdhCF2gDAPJTBgPAgDlmTZlq1ZKtWomue683CmPay1+o+19j6nnLyBJIxGxUcfLFXdW/ecs5+1nuf3/AbBG7/+0H8558Qjjzwiwr/KRx99tPwv/Fl5/NLrdw+z3oHPv/ACa2ubRImaEQhlsmzvxGTnzd1+z5V5KaTWzR07d3y9FEI4B0prhoMBeZYhhbBJksiNjc3j/X7/TNpquamJttjsdk+cvXDpGQ1yenraHj58mIXZBTvsb1w89yvnzn/Xv/0ukyZpmeXZF/5o4siRIyr8b/vII484IYR749P9w/0l3ngL/nDe56POyeOPPCJOnDjhHnvsMTP+m1prnjt+fNfp86e3GZN/jVUsrCwtuSzL0h3bt39Dae2uOFatbDjEArkpkFKiEEglkFKCA2MtWxubOEA4gZACh0UK//sCR9JMidMU6xxSCJxzGGNwFqRUSCkRQLe71cvyfClOEytQvSwrfvO+Q3e6dqf50R0z8+cP7z585Qtf5Pve9z517733ikceecQB9o2CfqOA/6TfsgrgC29Y51zjFz/+qztfefmlmQN3HPwWpPwft7qbe6Ik]@IMAGE_KEY_0@B3452B;

const FORM_CONFIG = {
  'pilot-individual': {
    title: 'הרשמה לפיילוט — יחיד',
    subline: 'כמה פרטים ונחזור אליכם עם כל מידע ההצטרפות.',
    orgRequired: false,
    roleRequired: false,
    path: ['בחירת מסלול','פיילוט','יחיד']
  },
  'pilot-org': {
    title: 'הרשמה לפיילוט — ארגון',
    subline: 'ספרו לנו קצת עליכם ונתאם את השתתפות הארגון בפיילוט.',
    orgRequired: true,
    roleRequired: true,
    path: ['בחירת מסלול','פיילוט','ארגון']
  },
  'meeting': {
    title: 'קביעת פגישה',
    subline: 'השאירו פרטים ונתאם מועד שנוח לכם.',
    orgRequired: true,
    roleRequired: true,
    path: ['בחירת מסלול','פגישה']
  }
};

let state = { screen: 'landing', formType: null };

const APPS_SCRIPT_URL = "כאן_שמים_את_הקישור_שלך_מגוגל_שמסתיים_ב_exec";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1xFYHQlzYmpEFX6gkqu8fluwWrI-cnEr7QL2-uAHJXeY/edit?gid=0#gid=0";

async function saveSubmission(type, data){
  const payload = Object.assign({ type, submittedAt: new Date().toISOString() }, data);
  await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
}

function renderPath(steps, currentIndex){
  return `<div class="path">` + steps.map((label,i)=>{
    const cls = i < currentIndex ? 'done' : (i === currentIndex ? 'current' : '');
    const dotAndLabel = `<div class="path-step ${cls}"><span class="path-dot"></span><span class="path-label">${label}</span></div>`;
    return dotAndLabel + (i < steps.length-1 ? `<span class="path-line"></span>` : '');
  }).join('') + `</div>`;
}

function renderTopbar(){
  return `
  <div class="topbar">
    <div class="brand-slot">
      <div class="logo-badge"><img src="${LOGO_DATA_URI}" alt="לוגו"></div>
      <div class="brand-name">הקוד</div>
    </div>
    <button class="admin-btn" id="adminOpenBtn" title="אזור ניהול" aria-label="אזור ניהול">⚙</button>
  </div>`;
}

function renderLanding(){
  return `
  ${renderTopbar()}
  ${renderPath(['בחירת מסלול'], 0)}
  <div class="screen">
    <div class="eyebrow">בואו נתחיל</div>
    <h1 class="headline">איך נוכל לעזור לכם?</h1>
    <p class="subline">בחרו את האפשרות המתאימה — זה ייקח פחות מדקה.</p>
    <div class="choice-stack">
      <div class="choice-card" data-goto="pilotChoice">
        <div class="choice-icon">🚀</div>
        <div class="choice-body">
          <div class="choice-title">אני מתעניין/ת בפיילוט</div>
          <div class="choice-desc">להצטרפות מוקדמת לתוכנית הפיילוט</div>
        </div>
        <div class="choice-arrow">‹</div>
      </div>
      <div class="choice-card" data-goto="form:meeting">
        <div class="choice-icon">🗓️</div>
        <div class="choice-body">
          <div class="choice-title">אני רוצה לקבוע פגישה</div>
          <div class="choice-desc">לשיחת היכרות ותיאום מותאם אישית</div>
        </div>
        <div class="choice-arrow">‹</div>
      </div>
    </div>
  </div>`;
}

function renderPilotChoice(){
  return `
  ${renderTopbar()}
  ${renderPath(['בחירת מסלול','פיילוט'], 1)}
  <div class="screen">
    <button class="back-btn" data-goto="landing">→ חזרה</button>
    <div class="eyebrow">פיילוט</div>
    <h1 class="headline">איך תרצו להשתתף?</h1>
    <p class="subline">כדי שנוכל להתאים את התהליך הנכון עבורכם.</p>
    <div class="choice-stack">
      <div class="choice-card" data-goto="form:pilot-individual">
        <div class="choice-icon">🙋</div>
        <div class="choice-body">
          <div class="choice-title">להרשם לפיילוט כיחיד</div>
          <div class="choice-desc">הרשמה אישית לתוכנית</div>
        </div>
        <div class="choice-arrow">‹</div>
      </div>
      <div class="choice-card" data-goto="form:pilot-org">
        <div class="choice-icon">🏢</div>
        <div class="choice-body">
          <div class="choice-title">שהארגון שלי ישתתף בפיילוט</div>
          <div class="choice-desc">הרשמת השתתפות ארגונית</div>
        </div>
        <div class="choice-arrow">‹</div>
      </div>
    </div>
  </div>`;
}

function fieldHtml(id, label, type, required, extra){
  return `
  <div class="field" id="field-${id}">
    <label for="inp-${id}">${label}${required ? ' <span class="req-star">*</span>' : ''}</label>
    <input id="inp-${id}" type="${type}" ${extra||''} autocomplete="on">
    <div class="err-msg" id="err-${id}"></div>
  </div>`;
}

function renderForm(type){
  const cfg = FORM_CONFIG[type];
  const backTarget = type === 'meeting' ? 'landing' : 'pilotChoice';
  return `
  ${renderTopbar()}
  ${renderPath(cfg.path, cfg.path.length - 1)}
  <div class="screen">
    <button class="back-btn" data-goto="${backTarget}">→ חזרה</button>
    <div class="eyebrow">השארת פרטים</div>
    <h1 class="headline">${cfg.title}</h1>
    <p class="subline">${cfg.subline}</p>
    <p class="required-note"><span class="star">*</span> שדות חובה</p>
    <form id="leadForm">
      ${fieldHtml('firstName','שם פרטי','text',true)}
      ${fieldHtml('lastName','שם משפחה','text',true)}
      ${fieldHtml('email','דוא"ל','email',true)}
      ${fieldHtml('phone','טלפון נייד','tel',false)}
      ${fieldHtml('org','שם הארגון','text',cfg.orgRequired)}
      ${fieldHtml('role','תפקיד','text',cfg.roleRequired)}
      <button type="submit" class="submit-btn" id="submitBtn">שליחה</button>
    </form>
  </div>`;
}

function renderSuccess(type){
  const msg = type === 'meeting'
    ? 'קיבלנו את הפרטים שלכם ונחזור אליכם בקרוב לתיאום מועד.'
    : 'קיבלנו את ההרשמה שלכם לפיילוט — נהיה בקשר עם כל הפרטים הבאים.';
  return `
  ${renderTopbar()}
  <div class="success-wrap">
    <div class="success-icon">✓</div>
    <h2 class="headline" style="margin-top:0;">תודה רבה!</h2>
    <p class="subline">${msg}</p>
    <button class="home-btn" id="homeBtn">חזרה למסך הבית</button>
  </div>`;
}

const ADMIN_PASSCODE = '2026';

function renderAdminGate(){
  return `
  <div class="admin-overlay">
    <div class="admin-card">
      <div class="eyebrow">אזור ניהול</div>
      <h3 style="margin-top:8px;">הזינו קוד גישה</h3>
      <input id="passInput" type="password" placeholder="••••" maxlength="12">
      <div class="row">
        <button id="cancelAdmin">ביטול</button>
        <button class="primary" id="confirmAdmin">כניסה</button>
      </div>
    </div>
  </div>`;
}

function renderAdminDashboard(){
  const currentUrl = window.location.href.split('?')[0].split('#')[0];
  const sheetConfigured = SHEET_URL.indexOf('PASTE_YOUR') !== 0;

  return `
  <div class="admin-screen">
    <div class="topbar" style="padding:0 0 14px;">
      <h2 style="font-size:19px;">אזור ניהול</h2>
      <button class="admin-btn" id="closeAdminBtn" title="סגירה">✕</button>
    </div>

    <div class="admin-section">
      <h3>קוד QR למצגת</h3>
      <div class="qr-box">
        <div id="qrHolder"></div>
        <div class="qr-url">${currentUrl}</div>
        <div class="btn-row">
          <button class="small-btn primary" id="downloadQrBtn">הורדת תמונת QR</button>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <h3>נתונים שנאספו</h3>
      <p class="empty-note" style="text-align:right;padding:0 0 10px;">
        כל הרשמה נשלחת ישירות לגיליון Google שלך. הצפייה, הסינון והייצוא נעשים שם.
      </p>
      <div class="btn-row">
        ${sheetConfigured
          ? `<a class="small-btn primary" href="${SHEET_URL}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block;">פתיחת הגיליון</a>`
          : `<span class="empty-note" style="padding:0;">יש להגדיר את SHEET_URL בקוד כדי שהקישור יופיע כאן.</span>`}
      </div>
    </div>
  </div>`;
}

function goto(screen, extra){
  state.screen = screen;
  if(extra) Object.assign(state, extra);
  render();
}

async function render(){
  const app = document.getElementById('app');
  let html = '';
  if(state.screen === 'landing') html = renderLanding();
  else if(state.screen === 'pilotChoice') html = renderPilotChoice();
  else if(state.screen === 'form') html = renderForm(state.formType);
  else if(state.screen === 'success') html = renderSuccess(state.formType);
  app.innerHTML = html;
  attachHandlers();

  if(state.adminGateOpen){
    const gate = document.createElement('div');
    gate.id = 'adminGateWrap';
    gate.innerHTML = renderAdminGate();
    document.body.appendChild(gate);
    attachAdminGateHandlers();
  }
  if(state.adminDashboardOpen){
    app.innerHTML = renderAdminDashboard();
    attachAdminDashboardHandlers();
    renderQrCode();
  }
}

function attachHandlers(){
  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const target = el.getAttribute('data-goto');
      if(target.startsWith('form:')){
        goto('form', { formType: target.split(':')[1] });
      } else {
        goto(target);
      }
    });
  });
  const adminBtn = document.getElementById('adminOpenBtn');
  if(adminBtn){
    adminBtn.addEventListener('click', ()=>{ state.adminGateOpen = true; render(); });
  }
  const homeBtn = document.getElementById('homeBtn');
  if(homeBtn){ homeBtn.addEventListener('click', ()=> goto('landing')); }

  const form = document.getElementById('leadForm');
  if(form){
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const cfg = FORM_CONFIG[state.formType];
      const values = {
        firstName: document.getElementById('inp-firstName').value.trim(),
        lastName: document.getElementById('inp-lastName').value.trim(),
        email: document.getElementById('inp-email').value.trim(),
        phone: document.getElementById('inp-phone').value.trim(),
        org: document.getElementById('inp-org').value.trim(),
        role: document.getElementById('inp-role').value.trim(),
      };
      const errors = {};
      if(!values.firstName) errors.firstName = 'שדה חובה';
      if(!values.lastName) errors.lastName = 'שדה חובה';
      if(!values.email) errors.email = 'שדה חובה';
      else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(values.email)) errors.email = 'כתובת דוא"ל לא תקינה';
      if(cfg.orgRequired && !values.org) errors.org = 'שדה חובה';
      if(cfg.roleRequired && !values.role) errors.role = 'שדה חובה';

      ['firstName','lastName','email','org','role'].forEach(k=>{
        const fieldEl = document.getElementById('field-'+k);
        const inputEl = document.getElementById('inp-'+k);
        const errEl = document.getElementById('err-'+k);
        if(fieldEl && inputEl && errEl){
          if(errors[k]){
            fieldEl.classList.add('has-err');
            inputEl.classList.add('err');
            errEl.textContent = errors[k];
          } else {
            fieldEl.classList.remove('has-err');
            inputEl.classList.remove('err');
          }
        }
      });

      if(Object.keys(errors).length > 0){
        const firstErrKey = Object.keys(errors)[0];
        document.getElementById('inp-'+firstErrKey).focus();
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'שולח...';
      try{
        await saveSubmission(state.formType, values);
        goto('success', { formType: state.formType });
      }catch(err){
        submitBtn.disabled = false;
        submitBtn.textContent = 'שליחה';
        alert('אירעה שגיאה בשמירת הפרטים. נסו שוב.');
      }
    });
  }
}

function attachAdminGateHandlers(){
  const wrap = document.getElementById('adminGateWrap');
  const cancel = document.getElementById('cancelAdmin');
  const confirm = document.getElementById('confirmAdmin');
  const input = document.getElementById('passInput');
  if(input) input.focus();
  const close = ()=>{ state.adminGateOpen = false; if(wrap) wrap.remove(); };
  if(cancel) cancel.addEventListener('click', close);
  const tryConfirm = ()=>{
    if(input.value === ADMIN_PASSCODE){
      state.adminGateOpen = false;
      if(wrap) wrap.remove();
      state.adminDashboardOpen = true;
      render();
    } else {
      input.value = '';
      input.placeholder = 'קוד שגוי, נסו שוב';
      input.focus();
    }
  };
  if(confirm) confirm.addEventListener('click', tryConfirm);
  if(input) input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') tryConfirm(); });
}

function attachAdminDashboardHandlers(){
  const closeBtn = document.getElementById('closeAdminBtn');
  if(closeBtn){
    closeBtn.addEventListener('click', ()=>{
      state.adminDashboardOpen = false;
      render();
    });
  }
  const dlBtn = document.getElementById('downloadQrBtn');
  if(dlBtn) dlBtn.addEventListener('click', downloadQr);
}

function renderQrCode(){
  const holder = document.getElementById('qrHolder');
  if(!holder) return;
  holder.innerHTML = '';
  const url = window.location.href.split('?')[0].split('#')[0];
  try{
    new QRCode(holder, {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#1B2430',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }catch(e){
    holder.innerHTML = '<div class="empty-note">לא ניתן ליצור קוד QR כרגע</div>';
  }
}

function downloadQr(){
  const holder = document.getElementById('qrHolder');
  if(!holder) return;
  const img = holder.querySelector('img');
  const canvas = holder.querySelector('canvas');
  let dataUrl = null;
  if(canvas) dataUrl = canvas.toDataURL('image/png');
  else if(img) dataUrl = img.src;
  if(!dataUrl) return;
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = 'qr-code.png';
  a.click();
}

render();
</script>
</body>
</html>
