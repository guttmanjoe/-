<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצטרפות לפיילוט / קביעת פגישה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Heebo:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#EEF0E9;
    --paper:#FFFFFF;
    --ink:#1B2430;
    --ink-soft:#606A76;
    --teal:#1F6F5C;
    --teal-dark:#154A3F;
    --teal-tint:#E4EFEC;
    --amber:#D98F3A;
    --amber-tint:#FBF0E1;
    --line:#DEE1D8;
    --danger:#B3452B;
    --radius:18px;
    --shadow: 0 8px 24px rgba(27,36,48,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Heebo',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.06em;
    color:var(--teal-dark);
    text-transform:uppercase;
  }
  h1,h2,h3{font-family:'Rubik',sans-serif;margin:0;}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px 6px;
  }
  .brand-slot{
    display:flex;align-items:center;gap:10px;
  }
  .logo-badge{
    width:40px;height:40px;
    flex-shrink:0;
  }
  .logo-badge img{width:100%;height:100%;object-fit:contain;display:block;}
  .brand-name{font-family:'Rubik',sans-serif;font-weight:700;font-size:15px;color:var(--ink);}
  .required-note{
    font-size:12px;color:var(--ink-soft);margin-top:10px;
  }
  .required-note .star{color:var(--amber);font-weight:600;}
  .req-star{color:var(--amber);font-weight:600;margin-inline-start:2px;}
  .admin-btn{
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink-soft);font-size:15px;
    transition:.15s;
  }
  .admin-btn:hover{border-color:var(--teal);color:var(--teal);}

  .path{
    display:flex;align-items:center;gap:6px;
    padding:14px 20px 4px;
    flex-wrap:wrap;
  }
  .path-step{display:flex;align-items:center;gap:6px;}
  .path-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--line);
    flex-shrink:0;
  }
  .path-step.done .path-dot{background:var(--teal);}
  .path-step.current .path-dot{
    background:var(--paper);
    border:2.5px solid var(--teal);
    width:10px;height:10px;
  }
  .path-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--ink-soft);
  }
  .path-step.done .path-label,.path-step.current .path-label{color:var(--teal-dark);font-weight:500;}
  .path-line{width:16px;height:1px;background:var(--line);}

  .screen{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:18px 20px 40px;
    animation:rise .35s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .headline{font-size:25px;font-weight:700;line-height:1.3;margin-top:14px;}
  .subline{font-size:14.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}

  .choice-stack{margin-top:26px;display:flex;flex-direction:column;gap:14px;}
  .choice-card{
    background:var(--paper);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    display:flex;
    align-items:center;
    gap:16px;
    cursor:pointer;
    text-align:right;
    transition:.15s ease;
    box-shadow:var(--shadow);
  }
  .choice-card:hover{border-color:var(--teal);transform:translateY(-2px);}
  .choice-icon{
    width:46px;height:46px;border-radius:12px;
    background:var(--teal-tint);color:var(--teal-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
  }
